<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রাতের দৃশ্যের গ্রাফিক্স</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* স্ক্রলবার লুকানোর জন্য */
            background-color: #000; /* ডিফল্ট কালো ব্যাকগ্রাউন্ড */
        }

        /* ব্যাকগ্রাউন্ড ছবি */
        .container {
            width: 100vw;
            height: 100vh;
            background-image: url('96008.jpg'); /* আপনার ছবিটির নাম এখানে দিন */
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* ঘাস এবং ফুলের হালকা নড়াচড়া */
        @keyframes sway {
            0%, 100% {
                transform: rotate(-1deg);
            }
            50% {
                transform: rotate(1deg);
            }
        }

        .container::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%; /* ছবির নীচের অংশ যেখানে ঘাস আছে */
            background-image: inherit; /* একই ছবি ব্যবহার */
            background-position: bottom;
            background-size: cover;
            filter: blur(1px); /* হালকা ব্লার, যাতে মনে হয় নড়াচড়া করছে */
            animation: sway 5s ease-in-out infinite;
            z-index: 1; /* ঘাস সবার সামনে থাকবে */
        }

        /* মিটমিট করা তারা */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%; /* ছবির ওপরের অংশ যেখানে আকাশ আছে */
            z-index: 0; /* তারা ব্যাকগ্রাউন্ডের পেছনে থাকবে */
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0.5);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* বিভিন্ন সাইজের তারা তৈরি করার জন্য CSS */
        .star:nth-child(1) { top: 10%; left: 15%; animation-delay: 0.1s; }
        .star:nth-child(2) { top: 25%; left: 30%; animation-delay: 0.3s; width: 3px; height: 3px;}
        .star:nth-child(3) { top: 40%; left: 10%; animation-delay: 0.5s; }
        .star:nth-child(4) { top: 5%; left: 50%; animation-delay: 0.7s; }
        .star:nth-child(5) { top: 18%; left: 70%; animation-delay: 0.9s; width: 2px; height: 2px;}
        .star:nth-child(6) { top: 35%; left: 85%; animation-delay: 1.1s; }
        .star:nth-child(7) { top: 50%; left: 20%; animation-delay: 1.3s; }
        .star:nth-child(8) { top: 60%; left: 40%; animation-delay: 1.5s; width: 1px; height: 1px;}
        .star:nth-child(9) { top: 5%; left: 80%; animation-delay: 1.7s; }
        .star:nth-child(10) { top: 22%; left: 95%; animation-delay: 1.9s; }
        /* আপনি এখানে আরও তারা যোগ করতে পারেন */

        /* শুটিং স্টার */
        .shooting-star {
            position: absolute;
            top: 0;
            left: -100px;
            width: 100px;
            height: 2px;
            background: linear-gradient(-45deg, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0));
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 1));
            animation: shooting 3s linear infinite;
        }

        @keyframes shooting {
            0% {
                transform: translateX(0) translateY(0) rotate(-45deg);
                opacity: 1;
            }
            100% {
                transform: translateX(100vw) translateY(100vh) rotate(-45deg);
                opacity: 0;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- তারার কন্টেইনার -->
        <div class="stars">
            <!-- আপনি আরও .star ডিব যোগ করতে পারেন -->
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
        </div>

        <!-- শুটিং স্টার -->
        <div class="shooting-star"></div>
        <div class="shooting-star" style="animation-delay: 1s;"></div>
        <div class="shooting-star" style="animation-delay: 2s;"></div>
    </div>
</body>
</html>
