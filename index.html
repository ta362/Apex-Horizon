<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Horizon Cruise: Realistic Ridge</title>
    <style>
        :root {
            --glass: rgba(240, 230, 210, 0.15);
            --border: rgba(0, 0, 0, 0.1);
            --bg-dark: #d7b889;
            --text: #333333;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            color: var(--text);
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #e2c092;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(226, 192, 146, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 360px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #4a3e3d;
            margin-bottom: 25px;
        }

        .btn {
            background: #4a3e3d;
            border: none;
            color: #fff;
            padding: 14px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #635251;
        }

        /* ছবির মতো মিনিমালিস্ট বটম HUD */
        #hud-container {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 10%;
            pointer-events: none;
            z-index: 5;
            display: none;
            color: #4c4644;
            font-size: 1.3rem;
            font-weight: 500;
            opacity: 0.85;
        }

        .hud-text {
            font-family: monospace, sans-serif;
            letter-spacing: 1px;
        }
        .hud-sub {
            font-size: 0.75rem;
            display: block;
            opacity: 0.7;
            text-align: center;
            margin-top: 2px;
        }

        /* মোবাইল টাচ বাটন */
        #touch-controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6; display: none; }
        .touch-btn { position: absolute; background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; color: #333; font-weight: bold; font-size: 1.2rem; width: 75px; height: 75px; }
        #btn-left { bottom: 30px; left: 30px; }
        #btn-right { bottom: 30px; left: 120px; }
        #btn-accel { bottom: 30px; right: 30px; background: rgba(0,0,0,0.08); }
        #btn-brake { bottom: 30px; right: 120px; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- ছবির অবিকল ডাউন-স্ক্রিন ওএসডি HUD -->
    <div id="hud-container">
        <div>
            <div id="hud-miles" class="hud-text">0.0</div>
            <span class="hud-sub">miles</span>
        </div>
        <div style="font-size: 0.8rem; align-self: flex-end; letter-spacing: 2px; opacity: 0.6;">[ autodrive on ]</div>
        <div style="text-align: right;">
            <div id="hud-mph" class="hud-text">0.0</div>
            <span class="hud-sub">mph</span>
        </div>
    </div>

    <!-- Mobile Controls -->
    <div id="touch-controls">
        <div id="btn-left" class="touch-btn">◀</div>
        <div id="btn-right" class="touch-btn">▶</div>
        <div id="btn-accel" class="touch-btn">GAS</div>
        <div id="btn-brake" class="touch-btn">BRK</div>
    </div>

    <!-- MAIN MENU -->
    <div id="menu-main" class="screen active">
        <div class="glass-panel">
            <h1>HORIZON CRUISE</h1>
            <button class="btn" onclick="Game.start()">Drive Car</button>
        </div>
    </div>
</div>

<script>
const Game = {
    canvas: null, ctx: null, running: false, lastTime: 0,
    segments: [], segmentLength: 200, trackLength: null, cameraDepth: null, cameraHeight: 1100,
    playerX: 0, position: 0, speed: 0, maxSpeed: 120, accel: 45, handling: 2.0,
    keys: { left: false, right: false, accel: false, brake: false },
    skyOffset: 0, hills: [],

    init() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        window.addEventListener('resize', () => this.resize());
        this.resize();
        this.bindInput();
        this.generateHills();
    },
    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        this.cameraDepth = 1 / Math.tan((85 / 2) * Math.PI / 180);
    },
    generateHills() {
        // ছবির পেছনের পাহাড়ি ঢেউ ও উপত্যকা জেনারেট করা
        this.hills = [];
        let numHills = 30;
        for(let i=0; i<numHills; i++) {
            this.hills.push({
                x: (i / numHills) * window.innerWidth * 3,
                y: 220 + Math.sin(i * 1.5) * 40,
                r: 300 + Math.random() * 200
            });
        }
    },
    bindInput() {
        const handler = (e, status) => {
            if (e.key === 'ArrowUp' || e.key === 'w') this.keys.accel = status;
            if (e.key === 'ArrowDown' || e.key === 's') this.keys.brake = status;
            if (e.key === 'ArrowLeft' || e.key === 'a') this.keys.left = status;
            if (e.key === 'ArrowRight' || e.key === 'd') this.keys.right = status;
        };
        window.addEventListener('keydown', (e) => handler(e, true));
        window.addEventListener('keyup', (e) => handler(e, false));

        if('ontouchstart' in window) {
            document.getElementById('touch-controls').style.display = 'block';
            const setupTouch = (id, keyName) => {
                let el = document.getElementById(id);
                el.addEventListener('touchstart', (e) => { e.preventDefault(); this.keys[keyName] = true; });
                el.addEventListener('touchend', (e) => { e.preventDefault(); this.keys[keyName] = false; });
            };
            setupTouch('btn-left', 'left'); setupTouch('btn-right', 'right');
            setupTouch('btn-accel', 'accel'); setupTouch('btn-brake', 'brake');
        }
    },
    buildTrack() {
        this.segments = [];
        for(let i=0; i<600; i++) {
            let curve = 0;
            // ছবির মতো সুন্দর মৃদু বাঁকানো দীর্ঘ রাস্তা
            if (i > 40 && i < 220) curve = 1.8;
            if (i > 280 && i < 480) curve = -1.5;

            this.segments.push({
                index: i,
                p1: { world: { x: 0, y: Math.sin(i/20)*40, z: i * this.segmentLength }, screen: {} },
                p2: { world: { x: 0, y: Math.sin((i+1)/20)*40, z: (i + 1) * this.segmentLength }, screen: {} },
                curve: curve
            });
        }
        this.trackLength = this.segments.length * this.segmentLength;
    },
    start() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('hud-container').style.display = 'flex';
        
        this.position = 0; this.playerX = -0.15; this.speed = 40; // ছবির মতো হালকা বামে পজিশন
        this.buildTrack();
        this.running = true; this.lastTime = performance.now();
        requestAnimationFrame((t) => this.loop(t));
    },
    loop(time) {
        if (!this.running) return;
        let dt = (time - this.lastTime) / 1000;
        if(dt > 0.1) dt = 0.1;
        this.lastTime = time;

        this.update(dt);
        this.render();
        requestAnimationFrame((t) => this.loop(t));
    },
    update(dt) {
        // অটোড্রাইভ এবং ম্যানুয়াল থ্রোটল ব্যালেন্স
        if (this.keys.accel) this.speed += this.accel * dt;
        else if (this.keys.brake) this.speed -= (this.accel * 2) * dt;
        else {
            // স্থির গতি বজায় রাখা ছবির মতো (প্রায় 77 mph)
            if(this.speed < 77) this.speed += 10 * dt;
            if(this.speed > 77) this.speed -= 10 * dt;
        }

        if (this.speed > this.maxSpeed) this.speed = this.maxSpeed;
        if (this.speed < 0) this.speed = 0;

        this.position += this.speed * 5 * dt;
        let seg = this.findSegment(this.position);

        if (this.keys.left) this.playerX -= this.handling * dt;
        if (this.keys.right) this.playerX += this.handling * dt;
        
        // রাস্তার মোড় অনুযায়ী গাড়ি আলতো বাঁকানো
        this.playerX -= (this.speed / this.maxSpeed) * seg.curve * 0.0025;
        if (this.playerX > 1.8) this.playerX = 1.8;
        if (this.playerX < -1.8) this.playerX = -1.8;

        this.skyOffset += seg.curve * 0.06 * (this.speed / this.maxSpeed);

        if(this.position >= this.trackLength - 500) {
            this.position = 0; // ইনফিনিটি লুপ ক্রুজ
        }

        // ওএসডি ও ড্যাশবোর্ড আপডেট (ছবির ভ্যালু ম্যাচ করে)
        document.getElementById('hud-mph').innerText = (this.speed).toFixed(1);
        document.getElementById('hud-miles').innerText = (6.3 + (this.position / 100000)).toFixed(1);
    },
    findSegment(z) { return this.segments[Math.floor(z / this.segmentLength) % this.segments.length]; },
    project(p, cameraX, cameraY, cameraZ, width, height) {
        let worldX = p.world.x - cameraX, worldY = p.world.y - cameraY, worldZ = p.world.z - cameraZ;
        let scale = this.cameraDepth / worldZ;
        p.screen.x = Math.round((width / 2) + (scale * worldX * width / 2));
        p.screen.y = Math.round((height / 2) - (scale * worldY * height / 2));
        p.screen.w = Math.round(scale * width);
    },
    render() {
        let w = this.canvas.width, h = this.canvas.height;
        let ctx = this.ctx;
        ctx.clearRect(0, 0, w, h);

        // ১. ছবির মতো নিখুঁত সোনালী/হলুদাভ গোধূলি আকাশ (Warm Evening Sky Gradient)
        let skyGrad = ctx.createLinearGradient(0, 0, 0, h * 0.45);
        skyGrad.addColorStop(0, "#e8be91");
        skyGrad.addColorStop(0.6, "#eccfa7");
        skyGrad.addColorStop(1, "#f2dfbe");
        ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, w, h);

        // ২. ছবির মতো ব্যাকগ্রাউন্ডের হালকা হলুদ-সবুজ পাহাড়শ্রেণী (Rolling Hills)
        ctx.fillStyle = "#c5b682";
        this.hills.forEach((hill, idx) => {
            let cx = (hill.x - this.skyOffset * 110) % (w * 2);
            if(cx < -hill.r) cx += w * 2;
            ctx.beginPath();
            ctx.arc(cx, h * 0.45 + Math.sin(idx)*15, hill.r, Math.PI, 0);
            ctx.fill();
        });

        // ৩. থ্রিডি ট্র্যাক ও ঘাস রেন্ডারিং লুপ
        let baseSegment = this.findSegment(this.position);
        let basePercent = (this.position % this.segmentLength) / this.segmentLength;
        let currentCamZ = this.position - (basePercent * this.segmentLength);
        let camHeight = this.cameraHeight + (Math.sin(baseSegment.index/20)*40);

        let maxy = h;
        let cameraX = this.playerX * 1000;

        for(let n=0; n<110; n++) {
            let segment = this.segments[(baseSegment.index + n) % this.segments.length];
            let loopModifier = (segment.index < baseSegment.index) ? this.trackLength : 0;
            
            this.project(segment.p1, cameraX, camHeight, currentCamZ - loopModifier, w, h);
            this.project(segment.p2, cameraX, camHeight, currentCamZ - loopModifier, w, h);

            cameraX -= segment.curve * 1.5;
            if((segment.p1.world.z - currentCamZ <= this.cameraDepth) || (segment.p2.screen.y >= maxy)) continue;

            let p1 = segment.p1.screen, p2 = segment.p2.screen;
            let r1 = p1.w * 0.95, r2 = p2.w * 0.95;

            // ছবির মতো শুকনো হলুদ-সবুজ ঘাসের জমি (Dry Grass Plains)
            ctx.fillStyle = (segment.index % 2 === 0) ? "#b0aa6e" : "#b8b175";
            ctx.fillRect(0, p2.y, w, p1.y - p2.y);

            // অ্যাসফল্ট ডার্ক গ্রে রোড (Asphalt Grey Road)
            ctx.fillStyle = "#535152";
            ctx.beginPath(); ctx.moveTo(p1.x - r1, p1.y); ctx.lineTo(p2.x - r2, p2.y); ctx.lineTo(p2.x + r2, p2.y); ctx.lineTo(p1.x + r1, p1.y); ctx.closePath(); ctx.fill();

            // দুই কিনারার সূক্ষ্ম সাদা বর্ডার লাইন (Outer White Lines)
            ctx.fillStyle = "#e0dbd5";
            ctx.fillRect(p1.x - r1, p2.y, p1.w*0.015, p1.y - p2.y);
            ctx.fillRect(p1.x + r1 - p1.w*0.015, p2.y, p1.w*0.015, p1.y - p2.y);

            // মাঝখানের কাটা কাটা ডিভাইডার রোড লাইন (Center Dashed Lines)
            if(segment.index % 4 === 0) {
                ctx.fillStyle = "#e0dbd5";
                ctx.fillRect(p1.x - p1.w*0.01, p2.y, p1.w*0.02, p1.y - p2.y);
            }

            // বাম পাশের স্টিল সেফটি গার্ডরেল বেরিকেট (Metal Guard Rails)
            let drawSteelBarrier = () => {
                let bx1 = p1.x - (r1 * 1.05), bx2 = p2.x - (r2 * 1.05);
                ctx.strokeStyle = "#807e7b";
                ctx.lineWidth = p1.w * 0.025;
                ctx.beginPath(); ctx.moveTo(bx1, p1.y - p1.w*0.05); ctx.lineTo(bx2, p2.y - p2.w*0.05); ctx.stroke();
                
                // বেরিকেটের স্ট্যান্ড খুটি
                ctx.fillStyle = "#504f4d";
                ctx.fillRect(bx1, p1.y - p1.w*0.05, p1.w*0.01, p1.w*0.05);
            };
            drawSteelBarrier();

            maxy = p2.y;
        }

        // ৪. প্লেয়ারের সাদা রঙের স্পোর্টস কার (White Minimalism Car)
        this.drawTargetCar(w, h);
    },
    drawTargetCar(w, h) {
        let ctx = this.ctx, screenX = w / 2, screenY = h - 140;
        let carW = 205, carH = 85;

        // হালকা শ্যাডো
        ctx.fillStyle = "rgba(0,0,0,0.12)";
        ctx.fillRect(screenX - carW/1.9, screenY + carH - 15, carW*1.05, 15);

        // নিচের কালো ডিফ্যূজার/বাম্পার অংশ
        ctx.fillStyle = "#202022";
        ctx.beginPath();
        ctx.moveTo(screenX - carW/2.1, screenY + carH - 22);
        ctx.lineTo(screenX + carW/2.1, screenY + carH - 22);
        ctx.lineTo(screenX + carW/2.3, screenY + carH);
        ctx.lineTo(screenX - carW/2.3, screenY + carH);
        ctx.closePath(); ctx.fill();

        // প্রধান রিয়ার হোয়াইট বডি চ্যাসিস (White Sleek Body)
        ctx.fillStyle = "#ececee";
        ctx.beginPath();
        ctx.moveTo(screenX - carW/2, screenY + carH - 52); // বাম কোণ
        ctx.lineTo(screenX - carW/2.1, screenY + carH - 22);
        ctx.lineTo(screenX + carW/2.1, screenY + carH - 22);
        ctx.lineTo(screenX + carW/2, screenY + carH - 52); // ডান কোণ
        ctx.lineTo(screenX + carW/2.4, screenY); // টপ ডান
        ctx.lineTo(screenX - carW/2.4, screenY); // টপ বাম
        ctx.closePath(); ctx.fill();

        // ছবির অবিকল স্লিম ডার্ক ব্যাক গ্লাস উইন্ডো (Rear Glass Panel)
        ctx.fillStyle = "#424246";
        ctx.beginPath();
        ctx.moveTo(screenX - carW/2.9, screenY + 4);
        ctx.lineTo(screenX - carW/2.6, screenY + carH - 55);
        ctx.lineTo(screenX + carW/2.6, screenY + carH - 55);
        ctx.lineTo(screenX + carW/2.9, screenY + 4);
        ctx.closePath(); ctx.fill();

        // ছবির মতো স্টাইলিশ হরাইজন্টাল টেল লাইটস (Slim Tail Lights)
        ctx.fillStyle = "#3a1d1d"; // অফ-স্টেট রেড
        ctx.fillRect(screenX - carW/2.15, screenY + carH - 45, 32, 7);
        ctx.fillRect(screenX + carW/2.15 - 32, screenY + carH - 45, 32, 7);
        
        // টায়ারস (নিচের দুই কোণায় দৃশ্যমান কালো চাকা)
        ctx.fillStyle = "#1e1e1e";
        ctx.fillRect(screenX - carW/2.15, screenY + carH - 15, 24, 15);
        ctx.fillRect(screenX + carW/2.15 - 24, screenY + carH - 15, 24, 15);
    }
};

window.onload = () => { Game.init(); };
</script>
</body>
</html>
