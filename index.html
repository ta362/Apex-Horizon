<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Horizon | Mystical Meadow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #010616 0%, #02112a 40%, #051d3d 70%, #0b355a 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* ─── NAVIGATION BAR ─── */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .logo {
            color: #7bf1ff;
            font-size: 22px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 1.5px;
            text-shadow: 0 0 15px rgba(123, 241, 255, 0.5);
        }

        nav ul {
            list-style: none;
        }

        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: 0.3s ease;
            opacity: 0.8;
            letter-spacing: 1px;
            border: 1px solid rgba(123, 241, 255, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(123, 241, 255, 0.03);
        }

        nav ul li a:hover {
            color: #7bf1ff;
            opacity: 1;
            background: rgba(123, 241, 255, 0.1);
            box-shadow: 0 0 15px rgba(123, 241, 255, 0.3);
        }

        /* ─── HERO TEXT AREA ─── */
        .hero-section {
            position: absolute;
            top: 40%;
            left: 8%;
            transform: translateY(-50%);
            color: white;
            z-index: 50;
            max-width: 550px;
            user-select: none;
        }

        /* ─── NEW TEXT EXPLOSION FIXES ─── */
        .interactive-word {
            display: inline-block;
            margin-right: 10px;
            cursor: pointer;
        }

        .interactive-word span {
            display: inline-block;
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.2s ease, filter 1.2s ease;
            transform: translate(0, 0) rotate(0deg) scale(1);
            opacity: 1;
        }

        .hero-section h1 {
            font-size: 52px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
        }

        /* H1 Title Text Colors and Glow */
        .hero-section h1 .interactive-word span {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(123, 241, 255, 0.6);
        }

        /* Paragraph Text Colors */
        .hero-section p {
            font-size: 16px;
            line-height: 1.6;
            color: #a2bccc;
            font-weight: 300;
        }
        
        .hero-section p .interactive-word span {
            color: #a2bccc;
        }

        /* ─── BACKGROUND & NEBULA EFFECTS ─── */
        .nebula {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(0, 162, 255, 0.15), transparent 60%),
                        radial-gradient(circle at 30% 60%, rgba(13, 89, 140, 0.3), transparent 70%);
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; filter: drop-shadow(0 0 4px #fff); }
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            z-index: 2;
        }

        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-35deg) scale(0); opacity: 0; }
            5% { opacity: 1; transform: translate(-10px, 7px) rotate(-35deg) scale(1); }
            100% { transform: translate(-500px, 350px) rotate(-35deg) scale(1); opacity: 0; }
        }

        .shooting-star {
            position: absolute;
            width: 100px;
            height: 1.5px;
            background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
            z-index: 2;
            opacity: 0;
        }

        /* ─── MEADOW & GRASS AREA ─── */
        .field {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70%;
            z-index: 5;
        }

        .grass {
            position: absolute;
            bottom: -10px;
            width: 2.5px;
            background: linear-gradient(to top, #010f13, #042e2b, #09594b, #11876a);
            border-radius: 40% 40% 0 0;
            transform-origin: bottom center;
        }

        @keyframes float-glow {
            0% { transform: translateY(0) translateX(0) scale(0.8); opacity: 0.2; }
            50% { opacity: 1; transform: translateY(-40px) translateX(15px) scale(1.2); }
            100% { transform: translateY(-80px) translateX(-10px) scale(0.8); opacity: 0; }
        }

        .firefly {
            position: absolute;
            background: radial-gradient(circle, #7bf1ff 0%, rgba(0, 183, 255, 0.6) 50%, transparent 100%);
            border-radius: 50%;
            z-index: 6;
            filter: drop-shadow(0 0 8px #00d4ff) drop-shadow(0 0 15px #0077ff);
        }

        /* ─── GLOWING BLUE FLOWER ─── */
        .main-flower {
            position: absolute;
            bottom: 18%;
            left: 65%;
            width: 90px;
            height: 90px;
            z-index: 10;
            transform-origin: bottom center;
            animation: flower-sway 5s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 20px rgba(123, 241, 255, 0.8));
        }

        @keyframes flower-sway {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(3deg); }
        }

        @keyframes wind { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(4deg); } }
        @keyframes wind-reverse { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-3deg); } }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <a href="#" class="logo">APEX HORIZON</a>
        <nav>
            <ul>
                <li><a href="#projects" id="project-btn">Projects</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Content -->
    <div class="hero-section">
        <h1 id="mystical-title">Welcome to a Mystical World</h1>
        <p id="mystical-desc">Explore a bioluminescent atmosphere where nature meets digital art. Click on Projects to discover my tools and applications.</p>
    </div>

    <!-- Canvas / Background Fields -->
    <div class="nebula"></div>
    <div id="star-field"></div>
    <div class="field" id="grass-field"></div>

    <!-- Glowing Blue Flower -->
    <svg class="main-flower" viewBox="0 0 100 100">
        <path d="M50,100 Q46,75 50,50" stroke="#052c24" stroke-width="4" fill="none" />
        <g transform="translate(50,50)">
            <ellipse cx="0" cy="-22" rx="14" ry="24" fill="#c2f7ff" opacity="0.95"/>
            <ellipse cx="0" cy="22" rx="14" ry="24" fill="#69dbff" opacity="0.85"/>
            <ellipse cx="-22" cy="0" rx="24" ry="14" fill="#8ae2ff" opacity="0.9"/>
            <ellipse cx="22" cy="0" rx="24" ry="14" fill="#52cfff" opacity="0.9"/>
            <ellipse cx="-16" cy="-16" rx="18" ry="18" fill="#a8f0ff" opacity="0.9"/>
            <ellipse cx="16" cy="16" rx="18" ry="18" fill="#42c5ff" opacity="0.8"/>
            <ellipse cx="16" cy="-16" rx="18" ry="18" fill="#8ae2ff" opacity="0.9"/>
            <ellipse cx="-16" cy="16" rx="18" ry="18" fill="#32bfff" opacity="0.85"/>
            <circle cx="0" cy="0" r="7" fill="#005b73"/>
            <circle cx="0" cy="0" r="3" fill="#fff"/>
        </g>
    </svg>

    <script>
        // ─── IMPROVED TEXT EXPLOSION SCRIPT ───
        function modernTextSplitter(elementId) {
            const target = document.getElementById(elementId);
            const textHTML = target.innerText;
            const words = textHTML.split(" ");
            target.innerHTML = ""; 

            words.forEach(word => {
                const wordSpan = document.createElement("span");
                wordSpan.classList.add("interactive-word");
                
                // Break word into letters wrapped in spans
                wordSpan.innerHTML = word.split("").map(letter => `<span>${letter}</span>`).join("");
                target.appendChild(wordSpan);

                const triggerExplosion = () => {
                    const letters = wordSpan.querySelectorAll("span");
                    letters.forEach(letter => {
                        // Calculate massive explosion spread across viewport
                        const randomX = (Math.random() - 0.5) * window.innerWidth * 1.2;
                        const randomY = (Math.random() - 0.5) * window.innerHeight * 1.2;
                        const randomRotate = (Math.random() - 0.5) * 1080; // Wild rotations

                        letter.style.transform = `translate(${randomX}px, ${randomY}px) rotate(${randomRotate}deg) scale(1.3)`;
                        letter.style.filter = "drop-shadow(0 0 12px #7bf1ff)"; // Keeps them glowing while floating
                        letter.style.opacity = "0.85";
                    });

                    // Automatically return to base after 3 seconds
                    setTimeout(() => {
                        letters.forEach(letter => {
                            letter.style.transform = "translate(0, 0) rotate(0deg) scale(1)";
                            letter.style.filter = "none";
                            letter.style.opacity = "1";
                        });
                    }, 3000);
                };

                // Trigger on hover and on touch
                wordSpan.addEventListener("mouseenter", triggerExplosion);
                wordSpan.addEventListener("touchstart", (e) => {
                    triggerExplosion();
                });
            });
        }

        // Run the script
        modernTextSplitter("mystical-title");
        modernTextSplitter("mystical-desc");


        // ─── ORIGINAL BACKGROUND ANIMATIONS ───
        const starField = document.getElementById('star-field');
        for (let i = 0; i < 90; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 2 + 0.8;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 55}%`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.animation = `twinkle ${Math.random() * 3 + 2}s infinite ease-in-out`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            starField.appendChild(star);
        }

        setInterval(() => {
            const shootingStar = document.createElement('div');
            shootingStar.classList.add('shooting-star');
            shootingStar.style.top = `${Math.random() * 25}%`;
            shootingStar.style.right = `${Math.random() * 20}%`;
            shootingStar.style.animation = `shoot 1.8s linear forwards`;
            document.body.appendChild(shootingStar);
            setTimeout(() => { shootingStar.remove(); }, 1800);
        }, 5000);

        const grassField = document.getElementById('grass-field');
        const grassCount = 280;
        for (let i = 0; i < grassCount; i++) {
            const grass = document.createElement('div');
            grass.classList.add('grass');
            grass.style.height = `${Math.random() * 180 + 90}px`;
            grass.style.left = `${Math.random() * 100}%`;
            const anim = Math.random() > 0.5 ? 'wind' : 'wind-reverse';
            grass.style.animation = `${anim} ${Math.random() * 4 + 3}s infinite ease-in-out alternate`;
            grass.style.animationDelay = `${Math.random() * 2}s`;
            grassField.appendChild(grass);
        }

        function createFirefly() {
            const firefly = document.createElement('div');
            firefly.classList.add('firefly');
            const size = Math.random() * 7 + 4;
            firefly.style.width = `${size}px`;
            firefly.style.height = `${size}px`;
            firefly.style.bottom = `${Math.random() * 40 + 5}%`;
            firefly.style.left = `${Math.random() * 100}%`;
            
            const duration = Math.random() * 4 + 4;
            firefly.style.animation = `float-glow ${duration}s linear forwards`;
            
            grassField.appendChild(firefly);
            
            setTimeout(() => {
                firefly.remove();
            }, duration * 1000);
        }

        setInterval(createFirefly, 300);
        for(let i=0; i<20; i++) { createFirefly(); }
    </script>
</body>
</html>
