<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Horizon | Realistic Mystical Meadow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #010616 0%, #02112a 40%, #051d3d 70%, #0b355a 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* ─── NAVIGATION BAR ─── */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .logo {
            color: #7bf1ff;
            font-size: 22px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 1.5px;
            text-shadow: 0 0 15px rgba(123, 241, 255, 0.5);
        }

        nav ul {
            list-style: none;
        }

        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: 0.3s ease;
            opacity: 0.8;
            letter-spacing: 1px;
            border: 1px solid rgba(123, 241, 255, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(123, 241, 255, 0.03);
        }

        nav ul li a:hover {
            color: #7bf1ff;
            opacity: 1;
            background: rgba(123, 241, 255, 0.1);
            box-shadow: 0 0 15px rgba(123, 241, 255, 0.3);
        }

        /* ─── HERO TEXT AREA ─── */
        .hero-section {
            position: absolute;
            top: 35%;
            left: 8%;
            transform: translateY(-50%);
            color: white;
            z-index: 50;
            max-width: 550px;
        }

        .hero-section h1 {
            font-size: 52px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ffffff, #7bf1ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-section p {
            font-size: 16px;
            line-height: 1.6;
            color: #a2bccc;
            font-weight: 300;
        }

        /* ─── BACKGROUND EFFECTS ─── */
        .nebula {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(0, 162, 255, 0.12), transparent 60%),
                        radial-gradient(circle at 30% 60%, rgba(13, 89, 140, 0.25), transparent 70%);
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; filter: drop-shadow(0 0 4px #fff); }
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            z-index: 2;
        }

        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-35deg) scale(0); opacity: 0; }
            5% { opacity: 1; transform: translate(-10px, 7px) rotate(-35deg) scale(1); }
            100% { transform: translate(-500px, 350px) rotate(-35deg) scale(1); opacity: 0; }
        }

        .shooting-star {
            position: absolute;
            width: 100px;
            height: 1.5px;
            background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
            z-index: 2;
            opacity: 0;
        }

        /* ─── DENSE MEADOW LAYERS ─── */
        .field {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 75%;
            z-index: 5;
        }

        .grass {
            position: absolute;
            bottom: -15px;
            border-radius: 80% 80% 0 0;
            transform-origin: bottom center;
        }

        /* 3D স্তরের গভীরতা তৈরি করার জন্য স্টাইল */
        .grass-back {
            width: 2px;
            background: linear-gradient(to top, #010a0d, #031f1d, #06382f);
            filter: blur(1px);
            z-index: 6;
        }

        .grass-mid {
            width: 2.5px;
            background: linear-gradient(to top, #010f13, #042e2b, #09594b, #0e6e58);
            z-index: 8;
        }

        .grass-front {
            width: 3.5px;
            background: linear-gradient(to top, #02151a, #063f3b, #0d7361, #1bb08d);
            filter: drop-shadow(2px 0 2px rgba(0,0,0,0.4));
            z-index: 12;
        }

        /* Fireflies */
        @keyframes float-glow {
            0% { transform: translateY(0) translateX(0) scale(0.6); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100px) translateX(-15px) scale(1); opacity: 0; }
        }

        .firefly {
            position: absolute;
            background: radial-gradient(circle, #7bf1ff 0%, rgba(0, 183, 255, 0.6) 50%, transparent 100%);
            border-radius: 50%;
            z-index: 9;
            filter: drop-shadow(0 0 8px #00d4ff) drop-shadow(0 0 15px #0077ff);
        }

        /* Glowing Flower (Sits within the mid-front layers) */
        .main-flower {
            position: absolute;
            bottom: 18%;
            left: 68%;
            width: 95px;
            height: 95px;
            z-index: 10;
            transform-origin: bottom center;
            animation: flower-sway 5s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 25px rgba(123, 241, 255, 0.85));
        }

        @keyframes flower-sway {
            0% { transform: rotate(-3deg); }
            100% { transform: rotate(4deg); }
        }

        /* Wind Animations */
        @keyframes wind-slow { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(2.5deg); } }
        @keyframes wind-mid { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(4deg); } }
        @keyframes wind-fast { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(5.5deg); } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">APEX HORIZON</a>
        <nav>
            <ul>
                <li><a href="#projects">Projects</a></li>
            </ul>
        </nav>
    </header>

    <div class="hero-section">
        <h1>Welcome to a Mystical World</h1>
        <p>Explore a bioluminescent atmosphere where nature meets digital art. Click on Projects to discover my tools and applications.</p>
    </div>

    <div class="nebula"></div>
    <div id="star-field"></div>
    
    <div class="field" id="grass-field"></div>

    <svg class="main-flower" viewBox="0 0 100 100">
        <path d="M50,100 Q46,75 50,50" stroke="#052c24" stroke-width="4" fill="none" />
        <g transform="translate(50,50)">
            <ellipse cx="0" cy="-22" rx="14" ry="24" fill="#c2f7ff" opacity="0.95"/>
            <ellipse cx="0" cy="22" rx="14" ry="24" fill="#69dbff" opacity="0.85"/>
            <ellipse cx="-22" cy="0" rx="24" ry="14" fill="#8ae2ff" opacity="0.9"/>
            <ellipse cx="22" cy="0" rx="24" ry="14" fill="#52cfff" opacity="0.9"/>
            <ellipse cx="-16" cy="-16" rx="18" ry="18" fill="#a8f0ff" opacity="0.9"/>
            <ellipse cx="16" cy="16" rx="18" ry="18" fill="#42c5ff" opacity="0.8"/>
            <ellipse cx="16" cy="-16" rx="18" ry="18" fill="#8ae2ff" opacity="0.9"/>
            <ellipse cx="-16" cy="16" rx="18" ry="18" fill="#32bfff" opacity="0.85"/>
            <circle cx="0" cy="0" r="7" fill="#005b73"/>
            <circle cx="0" cy="0" r="3" fill="#fff"/>
        </g>
    </svg>

    <script>
        // Stars
        const starField = document.getElementById('star-field');
        for (let i = 0; i < 90; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 2 + 0.8;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 55}%`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.animation = `twinkle ${Math.random() * 3 + 2}s infinite ease-in-out`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            starField.appendChild(star);
        }

        // Shooting Stars
        setInterval(() => {
            const shootingStar = document.createElement('div');
            shootingStar.classList.add('shooting-star');
            shootingStar.style.top = `${Math.random() * 25}%`;
            shootingStar.style.right = `${Math.random() * 20}%`;
            shootingStar.style.animation = `shoot 1.8s linear forwards`;
            document.body.appendChild(shootingStar);
            setTimeout(() => { shootingStar.remove(); }, 1800);
        }, 5000);

        // Highly Dense Realistic Grass Generator
        const grassField = document.getElementById('grass-field');
        
        // স্তর ১: পেছনের পাতলা ও অন্ধকার ঘাস (Background Layer)
        for (let i = 0; i < 250; i++) {
            const grass = document.createElement('div');
            grass.classList.add('grass', 'grass-back');
            grass.style.height = `${Math.random() * 140 + 120}px`;
            grass.style.left = `${Math.random() * 100}%`;
            grass.style.animation = `wind-slow ${Math.random() * 3 + 4}s infinite ease-in-out alternate`;
            grass.style.animationDelay = `${Math.random() * 2}s`;
            grassField.appendChild(grass);
        }

        // স্তর ২: মাঝের সাধারণ ঘাস (Midground Layer)
        for (let i = 0; i < 200; i++) {
            const grass = document.createElement('div');
            grass.classList.add('grass', 'grass-mid');
            grass.style.height = `${Math.random() * 120 + 90}px`;
            grass.style.left = `${Math.random() * 100}%`;
            grass.style.animation = `wind-mid ${Math.random() * 2 + 3}s infinite ease-in-out alternate`;
            grass.style.animationDelay = `${Math.random() * 1.5}s`;
            grassField.appendChild(grass);
        }

        // স্তর ৩: সামনের বড় এবং উজ্জ্বল ঘাস (Foreground Layer)
        for (let i = 0; i < 150; i++) {
            const grass = document.createElement('div');
            grass.classList.add('grass', 'grass-front');
            grass.style.height = `${Math.random() * 90 + 60}px`;
            grass.style.left = `${Math.random() * 100}%`;
            grass.style.animation = `wind-fast ${Math.random() * 1.5 + 2s}s infinite ease-in-out alternate`;
            grass.style.animationDelay = `${Math.random() * 1s}`;
            grassField.appendChild(grass);
        }

        // Fireflies
        function createFirefly() {
            const firefly = document.createElement('div');
            firefly.classList.add('firefly');
            const size = Math.random() * 6 + 3;
            firefly.style.width = `${size}px`;
            firefly.style.height = `${size}px`;
            firefly.style.bottom = `${Math.random() * 45 + 10}%`;
            firefly.style.left = `${Math.random() * 100}%`;
            
            const duration = Math.random() * 5 + 4;
            firefly.style.animation = `float-glow ${duration}s linear forwards`;
            
            grassField.appendChild(firefly);
            setTimeout(() => { firefly.remove(); }, duration * 1000);
        }

        setInterval(createFirefly, 250);
        for(let i=0; i<25; i++) { createFirefly(); }
    </script>
</body>
</html>
