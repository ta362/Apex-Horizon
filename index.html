<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার জাদুকরী ওয়েবসাইট</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #010616 0%, #03163a 60%, #0c2d54 100%);
            overflow-x: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* ─── নতুন ওয়েবসাইট কন্টেন্ট সেকশন ─── */
        
        /* নেভিগেশন বার (গ্লাস এফেক্ট) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100; /* এটাকে সবার উপরে রাখা হয়েছে */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            color: #7bf1ff;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            text-shadow: 0 0 10px rgba(123, 241, 255, 0.5);
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
            opacity: 0.8;
        }

        nav ul li a:hover {
            color: #7bf1ff;
            opacity: 1;
            text-shadow: 0 0 8px #7bf1ff;
        }

        /* মেইন টেক্সট এরিয়া */
        .hero-section {
            position: absolute;
            top: 40%;
            left: 10%;
            transform: translateY(-50%);
            color: white;
            z-index: 50;
            max-width: 600px;
        }

        .hero-section h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ffffff, #7bf1ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-section p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #ccdbec;
        }

        /* সুন্দর একটি বাটন */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: rgba(123, 241, 255, 0.1);
            color: #7bf1ff;
            text-decoration: none;
            border: 1px solid #7bf1ff;
            border-radius: 25px;
            font-weight: 600;
            transition: 0.4s;
            box-shadow: 0 0 15px rgba(123, 241, 255, 0.2);
        }

        .btn:hover {
            background: #7bf1ff;
            color: #03163a;
            box-shadow: 0 0 25px rgba(123, 241, 255, 0.6);
            transform: translateY(-3px);
        }


        /* ─── আগের অ্যানিমেশন পার্ট (অপরিবর্তিত) ─── */
        .nebula {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(24, 78, 119, 0.4), transparent 50%),
                        radial-gradient(circle at 20% 50%, rgba(12, 45, 84, 0.6), transparent 60%);
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 0 4px #fff;
        }

        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-35deg) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translate(-10px, 7px) rotate(-35deg) scale(1); }
            100% { transform: translate(-600px, 420px) rotate(-35deg) scale(1); opacity: 0; }
        }

        .shooting-star {
            position: absolute;
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
            z-index: 2;
            opacity: 0;
        }

        .field {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 65%;
            z-index: 5;
        }

        .grass {
            position: absolute;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to top, #021a1e, #053b32, #0d7057);
            border-radius: 50% 50% 0 0;
            transform-origin: bottom center;
        }

        @keyframes float-glow {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.4; }
            50% { transform: translateY(-20px) translateX(10px); opacity: 0.9; filter: drop-shadow(0 0 12px #00f3ff); }
        }

        .firefly {
            position: absolute;
            background: radial-gradient(circle, #7bf1ff 0%, rgba(0, 212, 255, 0.8) 40%, transparent 100%);
            border-radius: 50%;
            z-index: 6;
            filter: drop-shadow(0 0 6px #00d4ff);
        }

        .main-flower {
            position: absolute;
            bottom: 25%;
            left: 60%;
            width: 80px;
            height: 80px;
            z-index: 10;
            transform-origin: bottom center;
            animation: flower-sway 4s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 15px rgba(123, 241, 255, 0.8));
        }

        @keyframes flower-sway {
            0% { transform: rotate(-2deg) translateX(-2px); }
            100% { transform: rotate(3deg) translateX(2px); }
        }

        @keyframes wind { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(3deg); } }
        @keyframes wind-reverse { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-2.5deg); } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">MyHorizon</a>
        <nav>
            <ul>
                <li><a href="#">হোম</a></li>
                <li><a href="#">গ্যালারি</a></li>
                <li><a href="#">আমার সম্পর্কে</a></li>
                <li><a href="#">যোগাযোগ</a></li>
            </ul>
        </nav>
    </header>

    <div class="hero-section">
        <h1>স্বাগতম এক জাদুকরী দুনিয়ায়</h1>
        <p>এটি একটি অ্যানিমেটেড ওয়েব এক্সপেরিয়েন্স। এখানে তারা খসে পড়া, মিটমিট করা আলো আর মৃদু বাতাসে ঘাসের দোলা আপনার মনকে শান্ত করবে। আপনি চাইলে আপনার পছন্দমতো লেখা এখানে যুক্ত করতে পারেন।</p>
        <a href="#" class="btn">আরও জানুন</a>
    </div>

    <div class="nebula"></div>
    <div id="star-field"></div>
    <div class="field" id="grass-field"></div>

    <svg class="main-flower" viewBox="0 0 100 100">
        <path d="M50,100 Q45,70 50,50" stroke="#094a3a" stroke-width="3" fill="none" />
        <g transform="translate(50,50)">
            <ellipse cx="0" cy="-20" rx="12" ry="22" fill="#a6f1ff" opacity="0.95"/>
            <ellipse cx="0" cy="20" rx="12" ry="22" fill="#76deff" opacity="0.85"/>
            <ellipse cx="-20" cy="0" rx="22" ry="12" fill="#8ee5ff" opacity="0.9"/>
            <ellipse cx="20" cy="0" rx="22" ry="12" fill="#76deff" opacity="0.9"/>
            <ellipse cx="-15" cy="-15" rx="16" ry="16" fill="#bbf5ff" opacity="0.9"/>
            <circle cx="0" cy="0" r="6" fill="#006680"/>
            <circle cx="0" cy="0" r="3" fill="#fff"/>
        </g>
    </svg>

    <script>
        // তারা জেনারেটর
        const starField = document.getElementById('star-field');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 60}%`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.animation = `twinkle ${Math.random() * 3 + 2}s infinite ease-in-out`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            starField.appendChild(star);
        }

        // শুটিং স্টার
        setInterval(() => {
            const shootingStar = document.createElement('div');
            shootingStar.classList.add('shooting-star');
            shootingStar.style.top = `${Math.random() * 30}%`;
            shootingStar.style.right = `${Math.random() * 20}%`;
            shootingStar.style.animation = `shoot 1.5s linear forwards`;
            document.body.appendChild(shootingStar);
            setTimeout(() => { shootingStar.remove(); }, 1500);
        }, 4000);

        // ঘাস জেনারেটর
        const grassField = document.getElementById('grass-field');
        for (let i = 0; i < 250; i++) {
            const grass = document.createElement('div');
            grass.classList.add('grass');
            grass.style.height = `${Math.random() * 150 + 80}px`;
            grass.style.left = `${Math.random() * 100}%`;
            const anim = Math.random() > 0.5 ? 'wind' : 'wind-reverse';
            grass.style.animation = `${anim} ${Math.random() * 3 + 3}s infinite ease-in-out alternate`;
            grass.style.animationDelay = `${Math.random() * 2}s`;
            grassField.appendChild(grass);
        }

        // জোনাকি আলো
        for(let i=0; i<35; i++){
            const firefly = document.createElement('div');
            firefly.classList.add('firefly');
            const size = Math.random() * 6 + 4;
            firefly.style.width = `${size}px`;
            firefly.style.height = `${size}px`;
            firefly.style.bottom = `${Math.random() * 50 + 10}%`;
            firefly.style.left = `${Math.random() * 100}%`;
            firefly.style.animation = `float-glow ${Math.random() * 4 + 4}s infinite ease-in-out alternate`;
            firefly.style.animationDelay = `${Math.random() * 3}s`;
            grassField.appendChild(firefly);
        }
    </script>
</body>
</html>
